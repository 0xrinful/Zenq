{{define "action-menu"}}
  <div class="p-3 flex flex-col gap-3 text-sm">
    {{/* Each action section */}}
    {{range (actionSections .SourceID .MangaSlug)}}
      <div class="border-b border-border-dim pb-3 last:border-0 last:pb-0">
        <div class="text-xs text-dim uppercase tracking-widest mb-2 font-mono">{{.Label}}</div>
        {{if .HasRange}}
          <form
            hx-post="{{.Endpoint}}"
            hx-ext="json-enc"
            hx-indicator=".htmx-spinner"
            class="flex flex-col gap-2"
          >
            <div class="flex gap-2">
              <input class="input text-xs py-1" type="number" name="from" placeholder="from ch." />
              <input class="input text-xs py-1" type="number" name="to" placeholder="to ch." />
            </div>
            <label class="flex items-center gap-2 text-xs text-dim cursor-pointer">
              <input type="checkbox" name="all" class="accent-neon-blue" /> All chapters
            </label>
            <label class="flex items-center gap-2 text-xs text-dim cursor-pointer">
              <input type="checkbox" name="force" class="accent-neon-blue" /> Force (re-run)
            </label>
            <button type="submit" class="btn-primary text-xs py-1" hx-disabled-elt="this">▶ Run</button>
          </form>
        {{else if .IsDelete}}
          <form
            hx-delete="{{.Endpoint}}"
            hx-ext="json-enc"
            hx-indicator=".htmx-spinner"
            class="flex flex-col gap-2"
          >
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" name="raw" class="accent-neon-red" />
              <span class="text-dim">Raw downloaded</span>
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" name="optimized" class="accent-neon-red" />
              <span class="text-dim">Optimized</span>
            </label>
            <label class="flex items-center gap-2 text-xs cursor-pointer">
              <input type="checkbox" name="packed" class="accent-neon-red" />
              <span class="text-dim">Packed (.cbz)</span>
            </label>
            <button type="submit" class="btn-danger text-xs py-1" hx-disabled-elt="this">Delete</button>
          </form>
        {{else}}
          <button
            class="btn-ghost text-xs py-1 w-full"
            hx-post="{{.Endpoint}}"
            hx-indicator=".htmx-spinner"
            hx-disabled-elt="this"
          >
            ↻ Sync Chapters
          </button>
        {{end}}
      </div>
    {{end}}
  </div>
{{end}}
