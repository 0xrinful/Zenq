{{define "manga-card"}}
<a href="/manga/{{.SourceID}}/{{.Slug}}" class="card block overflow-hidden">
  <div class="aspect-[3/4] bg-raised">
    <img
      src="/manga/{{.SourceID}}/{{.Slug}}/cover"
      alt="{{.Title}}"
      class="h-full w-full object-cover"
      loading="lazy"
      onerror="this.src='/static/cover-placeholder.svg'"
    />
  </div>
  <div class="-mt-10 px-3 pb-3 pt-6 bg-gradient-to-t from-base/80 via-base/40 to-transparent">
    <h3 class="text-sm font-semibold leading-snug line-clamp-2">{{.Title}}</h3>
  </div>
</a>
{{end}}
